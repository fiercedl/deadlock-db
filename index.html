<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deadlock — Hero Reference Database</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --bg2: #0f1218;
    --bg3: #151a22;
    --bg4: #1c2330;
    --border: #2a3545;
    --border2: #3a4a60;
    --text: #c8d4e0;
    --text2: #7a90a8;
    --text3: #4a5f75;
    --accent: #4a9eff;
    --accent2: #2a6eb8;
    --weapon: #e8a040;
    --spirit: #a060f0;
    --vitality: #40c860;
    --melee: #e85040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 8px; letter-spacing: 1px; }

  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    padding: 7px 12px 7px 34px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 2px;
    display: none;
    user-select: none;
  }
  .search-clear:hover { color: var(--text); }
  .search-wrap.has-value .search-clear { display: block; }
  .search-wrap.has-value input { padding-right: 28px; }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
  }



  .count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    margin-left: auto;
  }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 4px;
  }
  .tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    padding: 10px 18px;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* SUB-TAB NAV (inside Shop) */
  .sub-tab-nav {
    display: flex;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 4px;
  }
  .sub-tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 8px 16px;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .sub-tab-btn:hover { color: var(--text2); }
  .sub-tab-btn[data-subtab="all"].active { color: var(--text); border-bottom-color: var(--text2); }
  .sub-tab-btn[data-subtab="weapon"].active { color: var(--weapon); border-bottom-color: var(--weapon); }
  .sub-tab-btn[data-subtab="vitality"].active { color: var(--vitality); border-bottom-color: var(--vitality); }
  .sub-tab-btn[data-subtab="spirit"].active { color: var(--spirit); border-bottom-color: var(--spirit); }

  /* hide shop search when on heroes tab — toggled via JS */

  

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .sub-tab-panel { display: none; }
  .sub-tab-panel.active { display: block; }

  /* ═══════════════════════════════════════
     SHOP — IN-GAME STYLE
  ═══════════════════════════════════════ */

  /* Three-column layout like the in-game shop */
  .shop-body {
    display: flex;
    height: calc(100vh - 90px);
    background: #0d0f12;
    overflow: hidden;
  }

  /* Left: the three category columns */
  .shop-columns {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 1px;
    background: var(--border);
  }

  /* Each category column scrolls independently */
  .shop-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0d0f12;
    min-width: 0;
  }
  .shop-col.hidden-col { display: none; }

  /* Column header — matches in-game category tab */
  .shop-col-header {
    flex-shrink: 0;
    padding: 10px 12px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 2px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .shop-col-header-icon {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }
  .shop-col-header-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .weapon-col .shop-col-header { border-color: var(--weapon); }
  .vitality-col .shop-col-header { border-color: var(--vitality); }
  .spirit-col .shop-col-header { border-color: var(--spirit); }
  .weapon-col .shop-col-header-label { color: var(--weapon); }
  .vitality-col .shop-col-header-label { color: var(--vitality); }
  .spirit-col .shop-col-header-label { color: var(--spirit); }

  /* Scrollable tile area */
  .shop-col-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* Tier section */
  .item-tier-section { margin-bottom: 2px; }
  .item-tier-header {
    padding: 5px 10px 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 4;
  }
  .item-tier-header .tier-roman {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 1px;
    width: 16px;
  }
  .item-tier-header .tier-cost {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  .item-tier-header .tier-count {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }

  /* Tile grid within a tier */
  .item-tile-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 3px;
    padding: 6px;
    background: var(--bg);
  }

  /* Individual item tile — styled like the in-game card */
  .item-tile {
    position: relative;
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid transparent;
    transition: border-color 0.1s, transform 0.1s;
    aspect-ratio: 3/4;
    background: var(--bg2);
  }
  .item-tile:hover { border-color: rgba(255,255,255,0.25); transform: scale(1.04); z-index: 2; }
  .item-tile.selected { border-color: white; transform: scale(1.04); z-index: 3; }
  .weapon-item.selected { border-color: var(--weapon); }
  .vitality-item.selected { border-color: var(--vitality); }
  .spirit-item.selected { border-color: var(--spirit); }

  /* Card backer image (the coloured gradient background) */
  .item-tile-backer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Item icon centered over backer */
  .item-tile-icon-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 22px; /* leave room for name */
  }
  .item-tile-icon {
    width: 72%;
    height: 72%;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
  }
  /* Fallback initials when icon fails to load */
  .item-tile-initials {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
    letter-spacing: -1px;
    display: none;
  }
  .item-tile-icon.errored { display: none; }
  .item-tile-icon.errored + .item-tile-initials { display: block; }

  /* Name strip at the bottom */
  .item-tile-name {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 3px 4px 3px;
    background: rgba(0,0,0,0.72);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    text-align: center;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Active indicator — small dot top-right */
  .item-tile-act {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .weapon-item .item-tile-act { background: var(--weapon); }
  .vitality-item .item-tile-act { background: var(--vitality); }
  .spirit-item .item-tile-act { background: var(--spirit); }

  /* Hidden tile (search) */
  .item-tile.hidden { display: none; }

  /* RIGHT: detail panel */
  .item-detail-panel {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .item-detail-panel.empty {
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    text-align: center;
    padding: 24px;
  }
  .detail-cat-bar { height: 4px; flex-shrink: 0; }
  .weapon-bar { background: var(--weapon); }
  .vitality-bar { background: var(--vitality); }
  .spirit-bar { background: var(--spirit); }

  .detail-icon-area {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .detail-icon-box {
    width: 64px;
    height: 80px;
    flex-shrink: 0;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .detail-icon-backer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .detail-icon-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 8px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  }
  .detail-name-block { flex: 1; min-width: 0; }
  .detail-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }
  .weapon-item-detail .detail-name { color: var(--weapon); }
  .vitality-item-detail .detail-name { color: var(--vitality); }
  .spirit-item-detail .detail-name { color: var(--spirit); }
  .detail-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .detail-cost {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  .detail-tier-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--bg4);
    color: var(--text3);
    border: 1px solid var(--border);
  }
  .detail-active-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
  }
  .weapon-item-detail .detail-active-badge { background: rgba(232,160,64,0.15); color: var(--weapon); border: 1px solid rgba(232,160,64,0.3); }
  .vitality-item-detail .detail-active-badge { background: rgba(64,200,96,0.15); color: var(--vitality); border: 1px solid rgba(64,200,96,0.3); }
  .spirit-item-detail .detail-active-badge { background: rgba(160,96,240,0.15); color: var(--spirit); border: 1px solid rgba(160,96,240,0.3); }

  .detail-section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .detail-section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .detail-stats {
    font-size: 12px;
    color: var(--text);
    line-height: 1.7;
  }
  .detail-effect {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.6;
  }
  .detail-component {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    line-height: 1.6;
  }

  /* "All" view: show all three columns at once */
  .all-view .shop-col { display: flex !important; }



  /* ═══════════════════════════════════════
     HERO PORTRAIT GRID
  ═══════════════════════════════════════ */
  #tab-heroes {
    height: calc(100vh - 90px);
    overflow-y: auto;
    background: var(--bg);
  }
  .hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    max-width: 1400px;
    gap: 6px;
    padding: 16px;
  }
  .hero-tile {
    position: relative;
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    aspect-ratio: 3/4;
    background: var(--bg3);
  }
  .hero-tile:hover { transform: scale(1.04); z-index: 2; box-shadow: 0 6px 20px rgba(0,0,0,0.6); }
  .hero-tile[data-role~="tank"]:hover       { border-color: var(--vitality); }
  .hero-tile[data-role~="assassin"]:hover   { border-color: #e05050; }
  .hero-tile[data-role~="initiator"]:hover  { border-color: var(--weapon); }
  .hero-tile[data-role~="support"]:hover    { border-color: var(--spirit); }
  .hero-tile[data-role~="disruptor"]:hover  { border-color: #9060d0; }
  .hero-tile[data-role~="carry"]:hover      { border-color: var(--accent); }
  .hero-tile-portrait { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
  .hero-tile:hover .hero-tile-portrait { filter: brightness(1.1); }
  .hero-tile-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 18px 6px 6px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: #fff; text-align: center;
    line-height: 1.1; text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  /* ═══════════════════════════════════════
     HERO DEEP DIVE OVERLAY
  ═══════════════════════════════════════ */
  .hero-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
  }
  .hero-overlay.active { display: flex; }
  .hero-overlay-panel {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: min(900px, 100vw);
    background: var(--bg2); border-left: 1px solid var(--border2);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: -12px 0 40px rgba(0,0,0,0.8);
    animation: slideInRight 0.2s ease-out;
  }
  @keyframes slideInRight {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  .ov-header {
    flex-shrink: 0; position: relative; height: 180px;
    overflow: hidden; background: var(--bg3); border-bottom: 1px solid var(--border2);
  }
  .ov-header-portrait {
    position: absolute; right: 0; top: 0; height: 100%; width: 280px;
    object-fit: cover; object-position: center top;
    mask-image: linear-gradient(to left, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
  }
  .ov-header-content {
    position: relative; z-index: 1; padding: 24px 24px 16px;
    height: 100%; display: flex; flex-direction: column; justify-content: space-between;
  }
  .ov-hero-name {
    font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: #fff; line-height: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }
  .ov-hero-weapon { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text2); letter-spacing: 1px; margin-top: 4px; }
  .ov-hero-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .ov-tag {
    font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 2px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--text2);
  }
  .ov-base-stats { display: flex; flex-wrap: wrap; gap: 8px 20px; }
  .stat-pill { display: flex; align-items: center; gap: 5px; }
  .stat-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
  .stat-value.weapon { color: var(--weapon); }
  .stat-value.spirit { color: var(--spirit); }
  .stat-value.vitality { color: var(--vitality); }
  .ov-close {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    background: rgba(0,0,0,0.4); border: 1px solid var(--border2); border-radius: 3px;
    color: var(--text2); font-size: 18px; cursor: pointer;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ov-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .ov-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .ov-section { border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .ov-section-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
  }
  .ov-ability-order { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .ov-order-step { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .ov-order-num { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text3); }
  .ov-order-ability {
    width: 36px; height: 36px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700;
    border: 2px solid var(--border); color: var(--text2); background: var(--bg4);
  }
  .ov-order-ability.slot-1 { border-color: var(--accent2); color: var(--accent); }
  .ov-order-ability.slot-2 { border-color: #4a8a4a; color: #60c060; }
  .ov-order-ability.slot-3 { border-color: #8a4a8a; color: #c060c0; }
  .ov-order-ability.slot-4 { border-color: #8a6a2a; color: #c09030; }
  .ov-order-sep { color: var(--border2); font-size: 12px; margin: 0 2px; align-self: center; padding-top: 18px; }
  .ov-hero-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .ov-hero-chip {
    display: flex; align-items: center; gap: 8px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px 6px 6px;
    cursor: pointer; transition: border-color 0.15s; min-width: 160px;
  }
  .ov-hero-chip:hover { border-color: var(--border2); background: var(--bg4); }
  .ov-hero-chip img { width: 32px; height: 32px; border-radius: 3px; object-fit: cover; object-position: top center; flex-shrink: 0; }
  .ov-hero-chip-name { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
  .ov-hero-chip-wr { font-family: 'Share Tech Mono', monospace; font-size: 11px; margin-left: auto; padding-left: 8px; }
  .ov-hero-chip-wr.good { color: #40e870; }
  .ov-hero-chip-wr.bad  { color: #ff5555; }
  .ov-item-row { display: flex; flex-direction: column; gap: 4px; }
  .ov-item-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px 5px 6px;
    transition: border-color 0.15s;
  }
  .ov-item-chip:hover { border-color: var(--border2); }
  .ov-item-chip-rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    width: 18px;
    flex-shrink: 0;
    text-align: right;
  }
  .ov-item-chip-backer {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; border-radius: 2px;
  }
  .ov-item-chip-icon-wrap {
    width: 32px;
    height: 38px;
    position: relative;
    flex-shrink: 0;
    border-radius: 2px;
    overflow: hidden;
    background: var(--bg4);
  }
  .ov-item-chip-icon-wrap img.ov-icon-main {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; padding: 2px;
    z-index: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7));
  }
  .ov-item-chip-info {
    flex: 1;
    min-width: 0;
  }
  .ov-item-chip-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ov-item-chip-cat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  .ov-item-chip-wr {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #40e870;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .ov-abilities { display: flex; flex-direction: column; gap: 0; }
  .ov-ability { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .ov-ability:last-child { border-bottom: none; }
  .ov-ability-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .ov-ability-num {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #fff;
    background: var(--accent2); border-radius: 2px; padding: 1px 5px; flex-shrink: 0;
  }
  .ov-ability-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; color: #e8f0fa; flex: 1; }
  .ov-ability-cd { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text2); }
  .ov-ability-stats {
    display: flex; flex-wrap: wrap; gap: 5px 16px; margin-bottom: 8px;
    padding: 7px 10px; background: rgba(0,0,0,0.3); border-radius: 3px; border: 1px solid var(--border);
  }
  .coef { font-family: 'Share Tech Mono', monospace; font-size: 12px; }
  .coef .label { color: var(--text2); }
  .coef .val { color: var(--spirit); font-weight: 600; font-size: 13px; }
  .coef .val.weapon-dmg { color: var(--weapon); }
  .coef .val.melee-dmg { color: var(--melee); }
  .coef .val.heal { color: var(--vitality); }
  .ov-upgrades { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  .ov-upgrade { display: flex; gap: 8px; font-size: 13px; line-height: 1.45; align-items: flex-start; }
  .ov-upgrade-tier {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    color: #fff; background: var(--accent2); border-radius: 2px; padding: 1px 5px; flex-shrink: 0; margin-top: 1px;
  }
  .ov-upgrade-text { color: var(--text); font-size: 13px; }
  .ov-ability-note { font-size: 12px; color: var(--text2); font-style: italic; margin-top: 6px; }
  .ov-loading { display: flex; align-items: center; gap: 8px; color: var(--text3); font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .ov-loading::before { content: '◈'; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* NOTES (legacy, kept for any remaining uses) */
  .ability-note {
    font-size: 12px; color: var(--text2); font-style: italic;
    margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); line-height: 1.5;
  }


  /* EMPTY STATE */
  .empty {
    grid-column: 1/-1;
    padding: 60px;
    text-align: center;
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
  }

  /* PATCH BADGE */
  .patch-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 1px 4px;
    border-radius: 2px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ═══════════════════════════════════════
     TRENDS TAB
  ═══════════════════════════════════════ */
  .trends-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
    background: var(--bg);
  }
  .trends-content {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Meta Brief Sidebar — LEFT, DOMINANT ── */
  .trends-sidebar {
    width: 420px;
    flex-shrink: 0;
    border-right: 1px solid var(--border2);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 20px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
  }
  .sidebar-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* Summary — big, readable, dominant */
  .sidebar-summary-wrap {
    padding: 12px 20px;
    flex-shrink: 0;
    flex-basis: auto;
    max-height: 310px;
    overflow: hidden;
    border-bottom: 2px solid var(--border2);
  }
  .summary-placeholder {
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }
  .summary-output { display: none; }
  .summary-output.visible { display: block; }
  .summary-sentence {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-sentence:first-child { padding-top: 0; }
  .summary-sentence:last-child { border-bottom: none; padding-bottom: 0; }
  .summary-sentence strong { color: #fff; font-weight: 700; }
  .summary-sentence .up   { color: #40e870; font-weight: 700; }
  .summary-sentence .down { color: #ff5555; font-weight: 700; }
  .summary-sentence .warn { color: var(--weapon); font-weight: 700; }
  .summary-refresh {
    display: none;
    margin-top: 12px;
    text-align: right;
  }
  .summary-refresh.visible { display: block; }
  .summary-refresh button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }
  .summary-refresh button:hover { color: var(--text2); }

  /* Data sections — no scroll, 2-col grid */
  .sidebar-body {
    padding: 6px 16px;
    flex: 1;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 12px;
    row-gap: 0;
    align-content: start;
    min-height: 0;
  }
  .brief-section { margin-bottom: 4px; }
  .brief-row { display: flex; align-items: center; gap: 6px; padding: 1px 0; }
  .brief-section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 3px;
    padding-bottom: 2px;
    border-bottom: 1px solid var(--border);
  }
  .brief-section-label.rising   { color: #40e870; }
  .brief-section-label.falling  { color: #ff5555; }
  .brief-section-label.dominant { color: var(--accent); }
  .brief-section-label.contested{ color: var(--weapon); }
  .brief-section-label.items    { color: var(--spirit); }

  .brief-portrait {
    width: 22px;
    height: 22px;
    border-radius: 2px;
    object-fit: cover;
    object-position: top center;
    flex-shrink: 0;
    background: var(--bg4);
  }
  .brief-hero-icon {
    width: 24px;
    height: 30px;
    flex-shrink: 0;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    background: var(--bg4);
    border: 1px solid var(--border2);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .brief-hero-icon img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 170%;
    object-fit: cover;
    object-position: top center;
  }
  .brief-item-icon {
    width: 24px;
    height: 30px;
    flex-shrink: 0;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    background: var(--bg4);
    border: 1px solid var(--border2);
  }
  .brief-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brief-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .brief-val.up      { color: #40e870; }
  .brief-val.down    { color: #ff5555; }
  .brief-val.neutral { color: var(--text2); }
  .brief-val.warn    { color: var(--weapon); }

  .brief-placeholder {
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 12px 0;
  }

  /* Table — RIGHT side, secondary */
  .trends-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* Summary — the main event */
  .trends-toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .trends-sub-tabs {
    display: flex;
    gap: 2px;
  }
  .trends-sub-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .trends-sub-btn:hover { color: var(--text); border-color: var(--border2); }
  .trends-sub-btn.active { background: var(--bg4); color: var(--accent); border-color: var(--accent2); }

  .trends-view-tabs {
    display: flex;
    gap: 2px;
    margin-left: 8px;
  }
  .trends-view-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .trends-view-btn:hover { color: var(--text); border-color: var(--border2); }
  .trends-view-btn.active { background: var(--bg4); color: var(--accent); border-color: var(--accent2); }

  /* Leaderboard */
  .leaderboard {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .lb-row:hover { background: var(--bg3); }
  .lb-rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    width: 32px;
    flex-shrink: 0;
    text-align: right;
  }
  .lb-rank.top { color: var(--accent); font-weight: 700; }
  .lb-portrait {
    width: 38px;
    height: 38px;
    border-radius: 3px;
    object-fit: cover;
    object-position: top center;
    flex-shrink: 0;
    background: var(--bg4);
    border: 1px solid var(--border);
  }
  .lb-name-wrap { flex: 1; min-width: 0; max-width: 300px; }
  .lb-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #e8f0fa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-tags {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-top: 1px;
  }
  .lb-pos {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    width: 48px;
    flex-shrink: 0;
    text-align: center;
  }
  .lb-stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
    width: 80px;
    flex-shrink: 0;
    text-align: right;
  }
  .lb-stat.dim { color: var(--text3); }
  .lb-wr {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    width: 80px;
    flex-shrink: 0;
    text-align: right;
  }
  .lb-wr.good { color: #40e870; }
  .lb-wr.bad  { color: #ff5555; }
  .lb-wr.mid  { color: var(--text2); }

  /* Column header tooltips */
  .th-tip {
    position: relative;
    cursor: help;
  }
  .th-tip::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    white-space: nowrap;
    padding: 5px 8px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
  }
  .th-tip:hover::after { opacity: 1; }

  /* Leaderboard sort toggle */
  .lb-sort-wrap {
    display: flex;
    gap: 6px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border2);
    background: var(--bg2);
  }
  .lb-sort-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text3);
    align-self: center;
    margin-right: 4px;
  }
  .lb-sort-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: none;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .lb-sort-btn:hover { color: var(--text); border-color: var(--border2); }
  .lb-sort-btn.active { background: var(--bg4); color: var(--accent); border-color: var(--accent2); }
  .lb-item-icon-lb {
    width: 30px;
    height: 36px;
    position: relative;
    flex-shrink: 0;
    border-radius: 2px;
    overflow: hidden;
    background: var(--bg4);
    border: 1px solid var(--border);
  }
  .lb-item-icon-lb img.lb-backer { position:absolute;inset:0;width:100%;height:100%;object-fit:cover; }
  .lb-item-icon-lb img.lb-icon { position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:2px; }

  .trends-sort-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .trends-sort-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .trends-sort-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: none;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .trends-sort-btn:hover { color: var(--text2); }
  .trends-sort-btn.active { color: var(--text); border-color: var(--border2); background: var(--bg4); }

  .trends-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }
  .trends-status.loading { color: var(--accent2); }
  .trends-status.error { color: #e05050; }

  .trends-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  /* Table */
  .trends-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .trends-table th:first-child,
  .trends-table td:first-child {
    width: 180px;
  }
  .trends-table th:nth-child(2), .trends-table td:nth-child(2) {
    width: 60px;
  }
  .trends-table th:nth-child(3), .trends-table td:nth-child(3),
  .trends-table th:nth-child(4), .trends-table td:nth-child(4),
  .trends-table th:nth-child(5), .trends-table td:nth-child(5),
  .trends-table th:nth-child(6), .trends-table td:nth-child(6) {
    width: 100px;
  }
  .trends-table th:last-child,
  .trends-table td:last-child {
    width: 100px;
  }
  .trends-table thead th {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--bg3);
    border-bottom: 2px solid var(--border2);
    padding: 10px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .trends-table thead th:hover { color: var(--text); }
  .trends-table thead th.sorted { color: var(--accent); }
  .trends-table thead th.sorted::after { content: ' ↓'; }
  .trends-table thead th.sorted.asc::after { content: ' ↑'; }
  .trends-table thead th.num { text-align: right; }

  .trends-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .trends-table tbody tr:hover { background: var(--bg3); }

  .trends-table td {
    padding: 7px 16px;
    font-size: 14px;
    vertical-align: middle;
    height: 54px;
    box-sizing: border-box;
  }
  .trends-table td.num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    text-align: right;
    color: var(--text);
  }

  /* Hero/item name cell */
  .trend-name-cell {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 38px;
    overflow: hidden;
  }
  .trend-portrait {
    width: 36px;
    height: 36px;
    border-radius: 3px;
    object-fit: cover;
    object-position: top center;
    flex-shrink: 0;
    background: var(--bg4);
    border: 1px solid var(--border);
  }
  .trend-item-icon-wrap {
    width: 29px;
    height: 36px;
    flex-shrink: 0;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    background: var(--bg4);
    border: 1px solid var(--border);
  }
  .trend-item-backer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .trend-item-icon {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
  }
  .trend-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #e8f0fa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .trend-tags {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;

function getInitials(name) {
  const parts = name.split(' ');
  if (parts.length === 1) return name[0];
  if (name === 'Mo & Krill') return 'M&K';
  if (name === 'The Doorman') return 'TD';
  if (name === 'Grey Talon') return 'GT';
  if (name === 'Lady Geist') return 'LG';
  return parts.map(p => p[0]).join('').slice(0, 2);
}

function coefClass(t) {
  if (t === 'spirit') return 'spirit';
  if (t === 'heal') return 'heal';
  if (t === 'weapon-dmg') return 'weapon-dmg';
  if (t === 'melee') return 'melee-dmg';
  return '';
}

function renderHeroGrid() {
  const q = searchEl.value.toLowerCase().trim();
  grid.innerHTML = '';
  let count = 0;
  HEROES.forEach(hero => {
    const searchTarget = [hero.name, hero.weapon, hero.notes||'', ...hero.tags,
      ...hero.abilities.map(a => a.name)].join(' ').toLowerCase();
    if (q && !searchTarget.includes(q)) return;
    const tile = document.createElement('div');
    tile.className = 'hero-tile';
    tile.dataset.role = hero.tags.join(' ');
    const portrait = PORTRAITS[hero.name] || '';
    tile.innerHTML = `
      ${portrait ? `<img class="hero-tile-portrait" src="${portrait}" alt="${hero.name}" loading="lazy" onerror="this.style.background='var(--bg4)'">` : ''}
      <div class="hero-tile-name">${hero.name}</div>`;
    tile.addEventListener('click', () => openHeroOverlay(hero));
    grid.appendChild(tile);
    count++;
  });
  countEl.textContent = `${count} / ${HEROES.length} heroes`;
}

  heroOverlay.classList.remove('active');

function openHeroOverlay(hero) {
  // Header
  const portrait = PORTRAITS[hero.name] || '';
  ovPortrait.src = portrait;
  ovName.textContent = hero.name;
  ovWeapon.textContent = hero.weapon;
  ovTags.innerHTML = hero.tags.map(t => `<span class="ov-tag">${t}</span>`).join('');

  const statDefs = [
    { l:'HP',    v: hero.stats.hp,       c:'vitality' },
    { l:'MS',    v: hero.stats.ms,       c:'' },
    { l:'DPS',   v: hero.stats.dps,      c:'weapon' },
    { l:'SP',    v: hero.stats.sp||'—',  c:'spirit' },
    { l:'BDMG',  v: hero.stats.bdmg||'—', c:'weapon' },
    { l:'RANGE', v: hero.stats.falloff||'—', c:'' },
  ];
  ovStats.innerHTML = statDefs.map(s =>
    `<div class="stat-pill"><span class="stat-label">${s.l}</span><span class="stat-value ${s.c}">${s.v}</span></div>`
  ).join('');

  // Body — build static sections immediately, API sections with loading state
  const heroId = getHeroIdByName(hero.name);

  ovBody.innerHTML = `
    <!-- Abilities -->
    <div class="ov-section">
      <div class="ov-section-title">Abilities & Scaling</div>
      <div class="ov-abilities">${buildAbilitiesHTML(hero)}</div>
    </div>

    <!-- Ability order -->
    <!-- Most purchased items + item pairs side by side -->
    <div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);max-height:420px">
      <div style="padding:16px 20px;border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin" id="ov-build-section">
        <div class="ov-section-title">Most Built Items (Asc+)</div>
        <div id="ov-build-content"><div class="ov-loading">Loading…</div></div>
      </div>
      <div style="padding:16px 20px;overflow-y:auto;scrollbar-width:thin" id="ov-items-section">
        <div class="ov-section-title">Highest WR Item Pairs (Asc+)</div>
        <div id="ov-items-content"><div class="ov-loading">Loading…</div></div>
      </div>
    </div>
  `;

  heroOverlay.classList.add('active');
  ovBody.scrollTop = 0;

  // Populate from pre-fetched cache or fetch now
  renderOverlayApiSections(hero, heroId);
}

function buildAbilitiesHTML(hero) {
  return hero.abilities.map(a => {
    const coefs = (a.stats||[]).map(s =>
      `<div class="coef"><span class="label">${s.l}: </span><span class="val ${coefClass(s.t)}">${s.v}</span></div>`
    ).join('');
    const ups = (a.upgrades||[]).map((u,i) =>
      `<div class="ov-upgrade"><span class="ov-upgrade-tier">T${i+1}</span><span class="ov-upgrade-text">${u}</span></div>`
    ).join('');
    const note = a.notes ? `<div class="ov-ability-note">${a.notes}</div>` : '';
    return `<div class="ov-ability">
      <div class="ov-ability-header">
        <span class="ov-ability-num">${a.num}</span>
        <span class="ov-ability-name">${a.name}</span>
        <span class="ov-ability-cd">${a.cd||''}</span>
      </div>
      ${coefs ? `<div class="ov-ability-stats">${coefs}</div>` : ''}
      ${note}
      ${ups ? `<div class="ov-upgrades">${ups}</div>` : ''}
    </div>`;
  }).join('');
}

function getHeroIdByName(name) {
  // Normalise "Doorman" -> "The Doorman" for API lookup
  const lookupName = name === 'Doorman' ? 'The Doorman' : name;
  for (const [id, n] of Object.entries(HERO_ID_MAP)) {
    if (n === lookupName || n === name) return +id;
  }
  for (const [id, n] of Object.entries(HERO_ID_FALLBACK)) {
    if (n === lookupName || n === name) return +id;
  }
  return null;
}

async function renderOverlayApiSections(hero, heroId) {
  if (!heroId) {
    ['order','build','items'].forEach(k => {
      const el = document.getElementById(`ov-${k}-content`);
      if (el) el.innerHTML = '<span style="color:var(--text3);font-size:12px">Hero ID not found</span>';
    });
    return;
  }

  const badge = 100;
  const itemCatMap = {};
  ['weapon','vitality','spirit'].forEach(cat => ITEMS[cat].forEach(item => { itemCatMap[item.name] = { cat, tier: item.tier }; }));

  function itemChipHTML(name, extraLabel, rank) {
    const meta = itemCatMap[name];
    const cat = meta?.cat || '';
    const tier = meta?.tier || 1;
    const iconUrl = cat ? itemIconUrl(name, cat) : '';
    const bUrl = cat ? backerUrl(cat, tier) : '';
    const catColor = cat === 'weapon' ? 'var(--weapon)' : cat === 'vitality' ? 'var(--vitality)' : cat === 'spirit' ? 'var(--spirit)' : 'var(--text3)';
    const catLabel = cat ? `${cat.toUpperCase()} T${tier}` : '';
    const rankHtml = rank != null ? `<div class="ov-item-chip-rank">#${rank}</div>` : '';
    return `<div class="ov-item-chip" title="${name}">
      ${rankHtml}
      <div class="ov-item-chip-icon-wrap">
        ${bUrl ? `<img class="ov-item-chip-backer" src="${bUrl}" alt="" onerror="this.style.display='none'">` : ''}
        ${iconUrl ? `<img class="ov-icon-main" src="${iconUrl}" alt="${name}" onerror="this.style.display='none'">` : ''}
      </div>
      <div class="ov-item-chip-info">
        <div class="ov-item-chip-name">${name}</div>
        ${catLabel ? `<div class="ov-item-chip-cat" style="color:${catColor}">${catLabel}</div>` : ''}
      </div>
      ${extraLabel ? `<span class="ov-item-chip-wr">${extraLabel}</span>` : ''}
    </div>`;
  }

  // ── Most built items — hero_id singular for correct filtering ──
  try {
    const buildRes = await fetch(`https://api.deadlock-api.com/v1/analytics/build-item-stats?hero_id=${heroId}&min_average_badge=${badge}`);
    const buildData = buildRes.ok ? await buildRes.json() : [];
    const buildEl = document.getElementById('ov-build-content');
    if (buildEl) {
      if (buildData && buildData.length) {
        const top10 = [...buildData]
          .sort((a,b) => (b.builds||0) - (a.builds||0))
          .slice(0, 10);
        buildEl.innerHTML = `<div class="ov-item-row">` +
          top10.map((r, i) => {
            const name = ITEM_ID_MAP[r.item_id] || null;
            if (!name) return '';
            return itemChipHTML(name, '', i + 1);
          }).filter(Boolean).join('') + '</div>';
      } else {
        buildEl.innerHTML = '<span style="color:var(--text3);font-size:12px">No data at Asc+</span>';
      }
    }
  } catch(e) {
    const el = document.getElementById('ov-build-content');
    if (el) el.innerHTML = '<span style="color:var(--text3);font-size:12px">Needs HTTPS</span>';
  }

  // ── Highest win rate item pairs ────────────────
  try {
    const permRes = await fetch(`https://api.deadlock-api.com/v1/analytics/item-permutation-stats?hero_ids=${heroId}&min_average_badge=${badge}&comb_size=2`);
    const permData = permRes.ok ? await permRes.json() : [];
    const itemsEl = document.getElementById('ov-items-content');
    if (itemsEl) {
      if (permData && permData.length) {
        const top6 = [...permData]
          .filter(r => r.matches >= 50)
          .sort((a,b) => (b.wins/Math.max(b.matches,1)) - (a.wins/Math.max(a.matches,1)))
          .slice(0, 4);
        itemsEl.innerHTML = top6.map((r, pairIdx) => {
          const names = (r.item_ids || []).map(id => ITEM_ID_MAP[id]).filter(Boolean);
          if (names.length < 2) return '';
          const wr = Math.round(r.wins / Math.max(r.matches,1) * 100);
          return `<div style="margin-bottom:4px">
            <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:3px">#${pairIdx+1} · ${wr}% WR · ${r.matches.toLocaleString()} matches</div>
            <div class="ov-item-row">${names.map(n => itemChipHTML(n, '')).join('')}</div>
          </div>`;
        }).filter(Boolean).join('') || '<span style="color:var(--text3);font-size:12px">No data at Asc+</span>';
      } else {
        itemsEl.innerHTML = '<span style="color:var(--text3);font-size:12px">No data at Asc+</span>';
      }
    }
  } catch(e) {
    const el = document.getElementById('ov-items-content');
    if (el) el.innerHTML = '<span style="color:var(--text3);font-size:12px">Needs HTTPS</span>';
  }
}

function itemIconUrl(name, category) {
  const override = ICON_OVERRIDES[name];
  const slug = override || name.toLowerCase().replace(/['']/g,'').replace(/[^a-z0-9]+/g,'_').replace(/_+$/,'');
  return CDN + '/items/' + category + '/' + slug + '.webp';
}
function backerUrl(category, tier) {
  return CDN + '/shop/catalog/cards/card_backer_' + category + '_t' + tier + '.webp';
}
function tileInitials(name) {
  const w = name.replace(/['']/g,'').split(/[\s\-]+/);
  return w.length === 1 ? name.slice(0,3).toUpperCase() : w.map(x=>x[0]).join('').slice(0,3).toUpperCase();
}

  const catClass = category + '-item-detail';

function buildItemTile(item, category, panel) {
  const tile = document.createElement('div');
  tile.className = `item-tile ${category}-item`;
  tile.dataset.search = [item.name, item.stats, item.effect, item.component].join(' ').toLowerCase();

  const iconUrl = itemIconUrl(item.name, category);
  const backer  = backerUrl(category, item.tier);
  const inits   = tileInitials(item.name);

  tile.innerHTML = `
    <img class="item-tile-backer" src="${backer}" alt="" draggable="false">
    <div class="item-tile-icon-wrap">
      <img class="item-tile-icon" src="${iconUrl}" alt="${item.name}" draggable="false"
           onerror="this.classList.add('errored')">
      <span class="item-tile-initials">${inits}</span>
    </div>
    <div class="item-tile-name">${item.name}</div>
    ${item.active ? '<div class="item-tile-act"></div>' : ''}
  `;

  tile.addEventListener('click', () => {
    if (selectedTile) selectedTile.classList.remove('selected');
    tile.classList.add('selected');
    selectedTile = tile;
    showDetail(item, category, panel);
  });
  return tile;
}

function renderColumn(gridEl, items, category, panel) {
  if (!gridEl || gridEl.dataset.rendered) return;
  gridEl.dataset.rendered = '1';

    const section = document.createElement('div');
    section.className = 'item-tier-section';

    row.className = 'item-tile-row';
    tierItems.forEach(item => row.appendChild(buildItemTile(item, category, panel)));

}

function filterItems(query) {
  const q = query.toLowerCase().trim();
  const panel = document.getElementById('detail-panel-' + activeItemCategory);

  // Get all relevant columns
  let cols = [];
  if (activeItemCategory === 'all') {
    cols = ['weapon','vitality','spirit'].map(c => document.getElementById('item-grid-all-' + c)).filter(Boolean);
  } else {
    const col = document.getElementById('item-grid-' + activeItemCategory);
    if (col) cols = [col];
  }

  let visible = 0;
  cols.forEach(col => {
    col.querySelectorAll('.item-tile').forEach(tile => {
      const match = !q || tile.dataset.search.includes(q);
      tile.classList.toggle('hidden', !match);
      if (match) visible++;
    });
    // Hide tier sections where all tiles hidden
    col.querySelectorAll('.item-tier-section').forEach(section => {
      const hasVisible = section.querySelector('.item-tile:not(.hidden)');
      section.style.display = hasVisible ? '' : 'none';
    });
  });

  if (q && selectedTile) {
    selectedTile.classList.remove('selected');
    selectedTile = null;
    if (panel) { panel.innerHTML = 'No item selected'; panel.classList.add('empty'); }
  }

  const totalItems = activeItemCategory === 'all'
    ? ITEMS.weapon.length + ITEMS.vitality.length + ITEMS.spirit.length
    : ITEMS[activeItemCategory].length;
  updateShopCount(visible, totalItems);
}

// LIVE DATA — merge assets API into hardcoded data on load
// ═══════════════════════════════════════════════════════════
async function mergeLiveData() {
  try {
    const [heroRes, itemRes] = await Promise.all([
      fetch('https://assets.deadlock-api.com/v2/heroes?only_active=true'),
      fetch('https://assets.deadlock-api.com/v2/items?only_active=true')
    ]);
    if (!heroRes.ok || !itemRes.ok) throw new Error('API error');
    const [liveHeroes, liveItems] = await Promise.all([heroRes.json(), itemRes.json()]);

    // ── Build ID maps from authoritative API data ────────────
    HERO_ID_MAP = {};
    liveHeroes.forEach(h => { if (h.id && h.name) HERO_ID_MAP[h.id] = h.name; });

    ITEM_ID_MAP = {};
    liveItems.forEach(i => { if (i.id && i.name) ITEM_ID_MAP[i.id] = i.name; });

    // ── Hero base stats ──────────────────────────────────────
    const heroApiMap = {};
    liveHeroes.forEach(h => { if (h.name) heroApiMap[h.name] = h; });

    HEROES.forEach(hero => {
      // API uses "The Doorman", our array uses "Doorman"
      const apiName = hero.name === 'Doorman' ? 'The Doorman' : hero.name;
      const live = heroApiMap[apiName];
      if (!live?.starting_stats) return;
      const s = live.starting_stats;
      if (s.max_health?.value)      hero.stats.hp  = Math.round(s.max_health.value).toString();
      if (s.max_move_speed?.value)  hero.stats.ms  = s.max_move_speed.value.toFixed(1);
      if (s.stamina?.value != null) hero.stats.stamina = s.stamina.value.toString();
    });

    // ── Item costs and tiers ─────────────────────────────────
    const itemApiMap = {};
    liveItems.forEach(i => { if (i.name) itemApiMap[i.name] = i; });

    ['weapon','vitality','spirit'].forEach(cat => {
      ITEMS[cat].forEach(item => {
        const live = itemApiMap[item.name];
        if (!live) return;
        if (live.cost)      item.cost = live.cost;
        if (live.item_tier) item.tier = live.item_tier;
        const p = live.properties || {};
        const upd = {};
        if (p.BonusHealth?.value)                  upd['+Health']        = p.BonusHealth.value;
        if (p.WeaponPower?.value)                  upd['+Weapon Power']  = `${p.WeaponPower.value}%`;
        if (p.TechPower?.value)                    upd['+Spirit Power']  = p.TechPower.value;
        if (p.AbilityCooldown?.value)              upd['Cooldown']       = `${p.AbilityCooldown.value}s`;
        if (p.BonusMoveSpeed?.value)               upd['+Move Speed']    = p.BonusMoveSpeed.value;
        if (p.BaseAttackDamagePercent?.value)      upd['+Damage']        = `${p.BaseAttackDamagePercent.value}%`;
        if (p.BulletArmorDamageReduction?.value)   upd['+Bullet Shield'] = `${p.BulletArmorDamageReduction.value}%`;
        if (p.TechArmorDamageReduction?.value)     upd['+Spirit Shield'] = `${p.TechArmorDamageReduction.value}%`;
        if (p.LifeStealPercent?.value)             upd['+Lifesteal']     = `${p.LifeStealPercent.value}%`;
        if (Object.keys(upd).length > 0) {
          if (!item.stats) item.stats = {};
          Object.assign(item.stats, upd);
        }
      });
    });

    // Re-render with fresh data
    filterAndRender();
    renderItemGrid(activeItemCategory || 'all');

    const badge = document.getElementById('live-data-badge');
    if (badge) {
      const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      badge.textContent = `✓ live · ${time}`;
      badge.style.color = 'var(--vitality)';
      badge.style.borderColor = 'rgba(64,200,96,0.3)';
      badge.style.background = 'rgba(64,200,96,0.06)';
    }
    console.log('[DB] Live data merged —', liveHeroes.length, 'heroes,', liveItems.length, 'items');

  } catch(e) {
    // Use hardcoded fallback IDs
    Object.assign(HERO_ID_MAP, HERO_ID_FALLBACK);
    const badge = document.getElementById('live-data-badge');
    if (badge) {
      badge.textContent = '✗ offline · hardcoded';
      badge.style.color = 'var(--text3)';
    }
    console.warn('[DB] Live merge failed — using fallback IDs:', e.message);
  }
}

// Derive pro stats from PRO_DATA
function buildProStats() {
  const heroStats = {}; // name -> { picks, bans, wins, items: {name: count} }
  const itemStats = {}; // name -> { picks }
  let totalMatches = 0;

  PRO_DATA.forEach(episode => {
    episode.matches.forEach(m => {
      totalMatches++;
      const allPicks = [...(m.picks_t1 || []), ...(m.picks_t2 || [])];
      const bans = m.bans || [];
      const winner = m.winner; // 1 or 2

      allPicks.forEach((hero, idx) => {
        if (!heroStats[hero]) heroStats[hero] = { picks: 0, bans: 0, wins: 0, items: {} };
        heroStats[hero].picks++;
        const onTeam1 = (m.picks_t1 || []).includes(hero);
        if ((onTeam1 && winner === 1) || (!onTeam1 && winner === 2)) heroStats[hero].wins++;
        // items
        if (m.items && m.items[hero]) {
          m.items[hero].forEach(item => {
            heroStats[hero].items[item] = (heroStats[hero].items[item] || 0) + 1;
          });
        }
      });
      bans.forEach(hero => {
        if (!heroStats[hero]) heroStats[hero] = { picks: 0, bans: 0, wins: 0, items: {} };
        heroStats[hero].bans++;
      });
      // item stats
      if (m.items) {
        Object.values(m.items).forEach(itemList => {
          itemList.forEach(item => {
            if (!itemStats[item]) itemStats[item] = { picks: 0 };
            itemStats[item].picks++;
          });
        });
      }
    });
  });
  return { heroStats, itemStats, totalMatches };
}

async function loadTrends(force = false) {
  if (trendsLoading) return;
  if (trendsCache && !force) { renderTrendsView(); generateBrief(); return; }

  trendsLoading = true;
  const statusEl = document.getElementById('trends-status');
  const refreshBtn = document.getElementById('trends-refresh-btn');
  statusEl.textContent = 'Fetching…';
  statusEl.className = 'trends-status loading';
  refreshBtn.disabled = true;

  try {
    // Two weeks of data bucketed by week
    const now = Math.floor(Date.now() / 1000);
    const twoWeeksAgo = now - 28 * 86400;

    const [heroRes, itemRes] = await Promise.all([
      fetch(`${TRENDS_API}/hero-stats?min_average_badge=${BADGE_MIN}&bucket=start_time_week&min_unix_timestamp=${twoWeeksAgo}`),
      fetch(`${TRENDS_API}/item-stats?min_average_badge=${BADGE_MIN}&bucket=start_time_week&min_unix_timestamp=${twoWeeksAgo}`)
    ]);

    if (!heroRes.ok || !itemRes.ok) throw new Error('API error');

    const [heroData, itemData] = await Promise.all([heroRes.json(), itemRes.json()]);

    trendsCache = { heroData, itemData, fetchedAt: Date.now() };
    statusEl.textContent = 'Asc+ · ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    statusEl.className = 'trends-status';
  } catch(e) {
    statusEl.textContent = 'Failed to load — CORS? Try from GitHub Pages';
    statusEl.className = 'trends-status error';
    document.getElementById('trends-body').innerHTML = `
      <div class="trends-placeholder">
        <div class="big">⚠</div>
        <div>Could not reach api.deadlock-api.com</div>
        <div style="color:var(--text3);font-size:10px;margin-top:4px">Works when served from GitHub Pages (HTTPS). Doesn't work from local file://</div>
      </div>`;
    trendsLoading = false;
    refreshBtn.disabled = false;
    return;
  }

  trendsLoading = false;
  document.getElementById('trends-refresh-btn').disabled = false;
  renderTrendsView();
  generateBrief();
}

function processHeroTrends(heroData) {
  const byHero = {};
  heroData.forEach(row => {
    if (!byHero[row.hero_id]) byHero[row.hero_id] = [];
    byHero[row.hero_id].push(row);
  });

  // matches_per_bucket = total player-slots in that bucket across all heroes
  const bucketTotals = {};
  heroData.forEach(row => {
    const b = row.bucket;
    if (!bucketTotals[b] || row.matches_per_bucket > bucketTotals[b])
      bucketTotals[b] = row.matches_per_bucket;
  });
  window.__heroBucketTotals__ = bucketTotals;

  const results = [];
  Object.entries(byHero).forEach(([heroId, rows]) => {
    rows.sort((a, b) => a.bucket - b.bucket);
    if (rows.length < 2) return;

    // Use oldest vs newest for pick/win delta (shows 4-week trend clearly)
    const prev = rows[0];
    const curr = rows[rows.length - 1];
    // Use two most recent for rank change only (less noisy)
    const prevRecent = rows[rows.length - 2];

    const prevTotal = (bucketTotals[prev.bucket] || 1) / 12;
    const currTotal = (bucketTotals[curr.bucket] || 1) / 12;
    const prevRecentTotal = (bucketTotals[prevRecent.bucket] || 1) / 12;

    const prevPick = prev.matches / prevTotal;
    const currPick = curr.matches / currTotal;
    const prevWin  = prev.wins / Math.max(prev.matches, 1);
    const currWin  = curr.wins / Math.max(curr.matches, 1);
    const prevRecentPick = prevRecent.matches / prevRecentTotal;

    const name = (HERO_ID_MAP[+heroId] || '').replace('The Doorman', 'Doorman');
    if (!name) return;

    results.push({
      id: +heroId,
      name,
      pick_rate: currPick,
      pick_delta: currPick - prevPick,
      win_rate: currWin,
      win_delta: currWin - prevWin,
      matches: curr.matches,
      _prevPick: prevRecentPick, // use recent bucket for rank change
    });
  });

  // Compute rank change: rank by current pick vs rank by previous pick
  const currRanked = [...results].sort((a,b) => b.pick_rate - a.pick_rate);
  const prevRanked = [...results].sort((a,b) => b._prevPick - a._prevPick);
  const prevRankMap = {};
  prevRanked.forEach((r,i) => { prevRankMap[r.id] = i + 1; });
  currRanked.forEach((r,i) => {
    const currRank = i + 1;
    const prevRank = prevRankMap[r.id] || currRank;
    const raw = prevRank - currRank;
    r.rank_change = Math.abs(raw) > 10 ? 0 : raw; // cap noise
    r.curr_rank = currRank;
  });

  return results;
}

function processItemTrends(itemData) {
  const byItem = {};
  itemData.forEach(row => {
    if (!byItem[row.item_id]) byItem[row.item_id] = [];
    byItem[row.item_id].push(row);
  });

  // Items share the same hero bucket totals for normalisation
  // since matches_per_bucket in item data may not be populated
  const bucketTotals = window.__heroBucketTotals__ || {};

  const results = [];
  Object.entries(byItem).forEach(([itemId, rows]) => {
    rows.sort((a, b) => a.bucket - b.bucket);
    if (rows.length < 2) return;

    // Use only the two most recent buckets to avoid distortion from new items
    const curr = rows[rows.length - 1];
    const prev = rows[rows.length - 2];

    const prevTotal = bucketTotals[prev.bucket] || 1;
    const currTotal = bucketTotals[curr.bucket] || 1;

    const prevPick = prev.matches / prevTotal;
    const currPick = curr.matches / currTotal;
    const prevWin  = prev.wins / Math.max(prev.matches, 1);
    const currWin  = curr.wins / Math.max(curr.matches, 1);

    const name = ITEM_ID_MAP[+itemId];
    if (!name) return;

    // Cap relative delta at ±50% to prevent outliers from dominating
    const raw_delta = prevPick > 0 ? (currPick - prevPick) / prevPick : 0;
    const pick_delta_rel = Math.max(-0.5, Math.min(0.5, raw_delta));

    results.push({
      id: +itemId,
      name,
      pick_rate: currPick,
      pick_delta: pick_delta_rel,
      win_rate: currWin,
      win_delta: currWin - prevWin,
      matches: curr.matches,
    });
  });
  return results;
}

function fmtPct(v) {
  return Math.round(v * 100) + '%';
}
function fmtDelta(v) {
  if (Math.abs(v) < 0.005) return '<span class="delta flat">—</span>';
  const sign = v > 0 ? '+' : '';
  const cls = v > 0 ? 'up' : 'down';
  const arrow = v > 0 ? '▲' : '▼';
  return `<span class="delta ${cls}">${arrow} ${sign}${Math.round(v * 100)}%</span>`;
}

function renderTrends() {
  if (!trendsCache) return;
  const { heroData, itemData } = trendsCache;
  const proStats = buildProStats();
  const body = document.getElementById('trends-body');

  let rows;
  if (activeTrendSection === 'heroes') {
    rows = processHeroTrends(heroData);
    // Sort
    rows.sort((a, b) => {
      const av = a[activeTrendSort] ?? 0;
      const bv = b[activeTrendSort] ?? 0;
      return trendSortAsc ? av - bv : bv - av;
    });
    // Filter out rows with tiny sample
    rows = rows.filter(r => r.matches >= 20);
    // Cap at top 38 heroes
    rows = rows.slice(0, 38);

    let html = `<table class="trends-table">
      <colgroup><col><col style="width:60px"><col><col><col><col><col></colgroup>
      <thead><tr>
        <th>Hero</th>
        <th class="num th-tip" style="width:60px" data-tip="Pick rate rank change vs last week">↕ Pos</th>

        <th class="num th-tip" data-col="win_rate" data-tip="Current win rate at Asc+">Win %</th>
        <th class="num th-tip" data-col="win_delta" data-tip="Win rate change over 4 weeks">Win Δ</th>
        <th>Pro</th>
      </tr></thead><tbody>`;

    rows.forEach(r => {
      const hero = HEROES.find(h => h.name === r.name);
      const portrait = hero ? (PORTRAITS[r.name] || '') : '';
      const tags = hero ? hero.tags.join(' · ') : '';
      const ps = proStats.heroStats[r.name];
      let proHtml = '<span style="color:var(--text3);font-size:10px">—</span>';
      if (ps && proStats.totalMatches > 0) {
        const presence = ((ps.picks + ps.bans) / proStats.totalMatches * 100).toFixed(0);
        const wr = ps.picks > 0 ? (ps.wins / ps.picks * 100).toFixed(0) + '% WR' : '';
        const topItems = Object.entries(ps.items).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]).join(', ');
        proHtml = `<span class="pro-badge">PRO</span><span class="pro-note">${presence}% presence${wr ? ' · ' + wr : ''}${topItems ? '<br><span style="font-size:10px;color:var(--text3)">' + topItems + '</span>' : ''}</span>`;
      }
      const rc = r.rank_change || 0;
      const rcHtml = rc === 0
        ? `<span style="color:var(--text3);font-size:11px;font-family:'Share Tech Mono',monospace">—</span>`
        : rc > 0
          ? `<span style="color:#40e870;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700">▲${rc}</span>`
          : `<span style="color:#ff5555;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700">▼${Math.abs(rc)}</span>`;
      html += `<tr>
        <td><div class="trend-name-cell">
          ${portrait ? `<img class="trend-portrait" src="${portrait}" alt="" onerror="this.style.display='none'">` : ''}
          <div><div class="trend-name">${r.name}</div><div class="trend-tags">${tags}</div></div>
        </div></td>
        <td class="num">${rcHtml}</td>
        <td class="num">${fmtDelta(r.pick_delta)}</td>
        <td class="num">${fmtPct(r.pick_rate)}</td>
        <td class="num">${fmtPct(r.win_rate)}</td>
        <td class="num">${fmtDelta(r.win_delta)}</td>
        <td>${proHtml}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    body.innerHTML = html;

  } else {
    // Items
    rows = processItemTrends(itemData);

    // Compute item rank changes (by pick rate)
    const itemsSortedByPickNow = [...rows].sort((a,b) => b.pick_rate - a.pick_rate);
    const itemsSortedByPickPrev = [...rows].sort((a,b) => (b.pick_rate - b.pick_delta) - (a.pick_rate - a.pick_delta));
    const itemPrevRankMap = {};
    itemsSortedByPickPrev.forEach((r,i) => { itemPrevRankMap[r.id] = i + 1; });
    itemsSortedByPickNow.forEach((r,i) => {
      const currRank = i + 1;
      const prevRank = itemPrevRankMap[r.id] || currRank;
      const raw = prevRank - currRank;
      r.rank_change = Math.abs(raw) > 10 ? 0 : raw; // cap at 10, zero out noise
    });

    rows.sort((a, b) => {
      const av = a[activeTrendSort] ?? 0;
      const bv = b[activeTrendSort] ?? 0;
      return trendSortAsc ? av - bv : bv - av;
    });
    rows = rows.filter(r => r.matches >= 30).slice(0, 60);

    // Map item name to category
    const itemCatMap = {};
    ['weapon','vitality','spirit'].forEach(cat => {
      ITEMS[cat].forEach(item => { itemCatMap[item.name] = cat; });
    });

    let html = `<table class="trends-table">
      <colgroup><col><col style="width:60px"><col><col><col><col><col></colgroup>
      <thead><tr>
        <th>Item</th>
        <th class="num th-tip" style="width:60px" data-tip="Pick rate rank change vs last week">↕ Pos</th>

        <th class="num th-tip" data-col="pick_rate" data-tip="Current pick rate at Asc+">Pick %</th>
        <th class="num th-tip" data-col="win_rate" data-tip="Current win rate at Asc+">Win %</th>
        <th class="num th-tip" data-col="win_delta" data-tip="Win rate change week-on-week">Win Δ</th>
        <th>Pro</th>
      </tr></thead><tbody>`;

    rows.forEach(r => {
      const cat = itemCatMap[r.name] || '';
      const catColor = cat === 'weapon' ? 'var(--weapon)' : cat === 'vitality' ? 'var(--vitality)' : cat === 'spirit' ? 'var(--spirit)' : 'var(--text3)';
      const catLabel = cat ? `<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:${catColor};text-transform:uppercase;font-weight:600;display:block;margin-top:1px;line-height:1">${cat}</span>` : '';
      const iconUrl = cat ? itemIconUrl(r.name, cat) : '';
      const backerU = cat ? (() => { const itemObj = ITEMS[cat]?.find(i => i.name === r.name); return itemObj ? backerUrl(cat, itemObj.tier) : ''; })() : '';
      const iconHtml = iconUrl ? `
        <div class="trend-item-icon-wrap">
          <img class="trend-item-backer" src="${backerU}" alt="" onerror="this.style.display='none'">
          <img class="trend-item-icon" src="${iconUrl}" alt="${r.name}" onerror="this.style.display='none'">
        </div>` : '';
      const ps = proStats.itemStats[r.name];
      let proHtml = '<span style="color:var(--text3);font-size:10px">—</span>';
      if (ps && proStats.totalMatches > 0) {
        const presence = (ps.picks / proStats.totalMatches * 100).toFixed(0);
        proHtml = `<span class="pro-badge">PRO</span><span class="pro-note">${presence}% presence</span>`;
      }
      const rc = r.rank_change || 0;
      const rcHtml = rc === 0
        ? `<span style="color:var(--text3);font-size:11px;font-family:'Share Tech Mono',monospace">—</span>`
        : rc > 0
          ? `<span style="color:#40e870;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700">▲${rc}</span>`
          : `<span style="color:#ff5555;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700">▼${Math.abs(rc)}</span>`;
      html += `<tr>
        <td><div class="trend-name-cell">
          ${iconHtml}
          <div><div class="trend-name">${r.name}</div>${catLabel}</div>
        </div></td>
        <td class="num">${rcHtml}</td>
        <td class="num">${fmtDelta(r.pick_delta)}</td>
        <td class="num">${fmtPct(r.pick_rate)}</td>
        <td class="num">${fmtPct(r.win_rate)}</td>
        <td class="num">${fmtDelta(r.win_delta)}</td>
        <td>${proHtml}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  }

  // Re-attach column sort listeners
  document.querySelectorAll('.trends-table thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (activeTrendSort === col) { trendSortAsc = !trendSortAsc; }
      else { activeTrendSort = col; trendSortAsc = false; }
      // sync sort buttons
      document.querySelectorAll('.trends-sort-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.sort === col);
      });
      renderTrends();
    });
  });
}
