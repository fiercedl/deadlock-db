function generateBrief() {
  if (!trendsCache) return;
  const { heroData, itemData } = trendsCache;
  const heroRows = processHeroTrends(heroData).filter(r => r.matches >= 20);
  const itemRows = processItemTrends(itemData).filter(r => r.matches >= 30);

  const dateEl = document.getElementById('sidebar-date');
  const bodyEl = document.getElementById('sidebar-body');
  if (!dateEl || !bodyEl) return;

  const now = new Date();
  dateEl.textContent = `Asc+ · ${now.toLocaleDateString('en-GB', {day:'numeric',month:'short'})}`;

  function heroRowHTML(r, valHtml) {
    const portrait = PORTRAITS[r.name] || '';
    return `<div class="brief-row">
      <div class="brief-hero-icon">
        ${portrait ? `<img src="${portrait}" alt="" onerror="this.style.display='none'">` : ''}
      </div>
      <span class="brief-name">${r.name}</span>
      ${valHtml}
    </div>`;
  }

  function itemRowHTML(r, valHtml) {
    const cat = (() => { for (const c of ['weapon','vitality','spirit']) { if (ITEMS[c].find(i=>i.name===r.name)) return c; } return ''; })();
    const iconUrl = cat ? itemIconUrl(r.name, cat) : '';
    const itemObj = cat ? ITEMS[cat].find(i=>i.name===r.name) : null;
    const bUrl = itemObj ? backerUrl(cat, itemObj.tier) : '';
    const catColor = cat === 'weapon' ? 'var(--weapon)' : cat === 'vitality' ? 'var(--vitality)' : cat === 'spirit' ? 'var(--spirit)' : 'var(--text3)';
    return `<div class="brief-row">
      <div class="brief-item-icon">
        ${bUrl ? `<img style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" src="${bUrl}" onerror="this.style.display='none'">` : ''}
        ${iconUrl ? `<img style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:2px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.8))" src="${iconUrl}" onerror="this.style.display='none'">` : ''}
      </div>
      <span class="brief-name" style="color:${catColor}">${r.name}</span>
      ${valHtml}
    </div>`;
  }

  // Rising heroes — biggest positive pick delta, max 3
  const rising = [...heroRows].sort((a,b) => b.pick_delta - a.pick_delta).slice(0,3);

  // Falling heroes — biggest negative pick delta, max 3
  const falling = [...heroRows].sort((a,b) => a.pick_delta - b.pick_delta).slice(0,3);

  // Dominant — highest win rate, pick rate above 2%, max 3
  const dominant = [...heroRows]
    .filter(r => r.pick_rate >= 0.20)
    .sort((a,b) => b.win_rate - a.win_rate)
    .slice(0,3);

  // Contested — high pick + low WR, sorted worst WR first
  const contested = [...heroRows]
    .sort((a,b) => (b.pick_rate / Math.max(b.win_rate, 0.01)) - (a.pick_rate / Math.max(a.win_rate, 0.01)))
    .filter(r => r.win_rate < 0.51)
    .slice(0,3)
    .sort((a,b) => a.win_rate - b.win_rate);

  // Hot items — rising pick delta, max 3
  const hotItems = [...itemRows].sort((a,b) => b.pick_delta - a.pick_delta).slice(0,3);

  // Cooling items — falling, max 3
  const coolingItems = [...itemRows].sort((a,b) => a.pick_delta - b.pick_delta).slice(0,3);

  function fmtDeltaVal(v, cls) {
    const sign = v > 0 ? '+' : '';
    const str = Math.round(Math.abs(v*100)).toString();
    return `<span class="brief-val ${cls}">${sign}${v > 0 ? '' : '-'}${str}%</span>`;
  }

  bodyEl.innerHTML = `
    <div class="brief-section">
      <div class="brief-section-label rising">↑ Pick Rising</div>
      ${rising.map(r => heroRowHTML(r, fmtDeltaVal(r.pick_delta,'up'))).join('')}
    </div>
    <div class="brief-section">
      <div class="brief-section-label falling">↓ Pick Falling</div>
      ${falling.map(r => heroRowHTML(r, fmtDeltaVal(r.pick_delta,'down'))).join('')}
    </div>
    <div class="brief-section">
      <div class="brief-section-label dominant">👑 Highest WR</div>
      ${dominant.map(r => heroRowHTML(r, `<span class="brief-val neutral">${Math.round(r.win_rate*100)}%</span>`)).join('')}
    </div>
    ${contested.length ? `<div class="brief-section">
      <div class="brief-section-label contested">⚠ High Pick / Low WR</div>
      ${contested.map(r => heroRowHTML(r, `<span class="brief-val warn">${Math.round(r.win_rate*100)}%</span>`)).join('')}
    </div>` : ''}
    <div class="brief-section">
      <div class="brief-section-label items">🔥 Items Rising</div>
      ${hotItems.map(r => itemRowHTML(r, fmtDeltaVal(r.pick_delta,'up'))).join('')}
    </div>
    <div class="brief-section">
      <div class="brief-section-label falling">❄ Items Falling</div>
      ${coolingItems.map(r => itemRowHTML(r, fmtDeltaVal(r.pick_delta,'down'))).join('')}
    </div>
  `;

  // Auto-generate summary and store snapshot
  window.__briefSnapshot__ = { rising, falling, dominant, contested, hotItems, coolingItems };
  generateSummary();
}

function generateSummary() {
  const snap = window.__briefSnapshot__;
  if (!snap) return;
  const output = document.getElementById('summary-output');
  const refresh = document.getElementById('summary-refresh');
  if (!output) return;

  const { rising, falling, dominant, contested, hotItems, coolingItems } = snap;
  const sentences = [];

  function hero(name) {
    const portrait = PORTRAITS[name] || '';
    const icon = portrait ? `<img src="${portrait}" style="width:14px;height:18px;object-fit:cover;object-position:top center;vertical-align:middle;margin-right:3px;border-radius:2px;border:1px solid var(--border2)" onerror="this.style.display='none'">` : '';
    return `${icon}<strong>${name}</strong>`;
  }
  function item(name) { return `<strong>${name}</strong>`; }
  function up(s) { return `<span class="up">${s}</span>`; }
  function dn(s) { return `<span class="down">${s}</span>`; }
  function warn(s) { return `<span class="warn">${s}</span>`; }
  function pct(v) { return Math.round(v * 100) + '%'; }
  function dpct(v) { return Math.round(Math.abs(v*100)) + '%'; }

  const r1 = rising[0], f1 = falling[0];
  if (r1 && f1) {
    const rWR = Math.round(r1.win_rate * 100);
    const wrTag = rWR >= 52 ? up(`${rWR}% WR`) : rWR <= 48 ? warn(`${rWR}% WR`) : `${rWR}% WR`;
    sentences.push(`${hero(r1.name)} rising ${up('+' + dpct(r1.pick_delta) + ' pick')} — ${wrTag}. ${hero(f1.name)} shedding ${dn('-' + dpct(f1.pick_delta) + ' pick')}.`);
  }

  if (dominant.length >= 1) {
    const d1 = dominant[0];
    const trend = d1.pick_delta > 0.005 ? ` and still climbing` : d1.pick_delta < -0.005 ? ` despite falling pick` : ``;
    sentences.push(`${hero(d1.name)} leads at ${up(pct(d1.win_rate) + ' WR')}${trend} — strongest performing hero at Asc+ this week.`);
  }

  if (contested.length > 0) {
    const c = contested[0];
    sentences.push(`${warn('⚠')} ${hero(c.name)} is a trap — ${warn(pct(c.win_rate) + ' WR')} despite high pick. Avoid or counter it.`);
  }

  if (hotItems.length >= 1) {
    const getCat = name => { for (const cat of ['weapon','vitality','spirit']) { if (ITEMS[cat].find(i=>i.name===name)) return cat; } return ''; };
    const cats = hotItems.slice(0,3).map(r => getCat(r.name));
    const weaponCount = cats.filter(c => c==='weapon').length;
    const vitalityCount = cats.filter(c => c==='vitality').length;
    const spiritCount = cats.filter(c => c==='spirit').length;
    const dominant = weaponCount >= vitalityCount && weaponCount >= spiritCount ? 'Gun' : vitalityCount >= spiritCount ? 'Survival' : 'Spirit';
    const catColor = dominant === 'Gun' ? 'var(--weapon)' : dominant === 'Survival' ? 'var(--vitality)' : 'var(--spirit)';

    function itemWithIcon(name) {
      const cat = getCat(name);
      const color = cat === 'weapon' ? 'var(--weapon)' : cat === 'vitality' ? 'var(--vitality)' : cat === 'spirit' ? 'var(--spirit)' : 'var(--text2)';
      const iconUrl = cat ? itemIconUrl(name, cat) : '';
      const icon = iconUrl ? `<img src="${iconUrl}" style="width:16px;height:20px;object-fit:contain;vertical-align:middle;margin-right:3px;border-radius:2px;opacity:0.9" onerror="this.style.display='none'">` : '';
      return `${icon}<span style="color:${color};font-weight:700">${name}</span>`;
    }

    const i1 = itemWithIcon(hotItems[0].name);
    const i2 = hotItems[1] ? itemWithIcon(hotItems[1].name) : null;
    sentences.push(`${i1}${i2 ? ` and ${i2}` : ''} rising — <span style="color:${catColor};font-weight:700">${dominant}</span> items trending this week.`);
  }

  output.innerHTML = sentences.map(s => `<div class="summary-sentence">${s}</div>`).join('');
  output.classList.add('visible');
  if (refresh) refresh.classList.add('visible');
}

document.getElementById('summary-btn').addEventListener('click', generateSummary);

// TRENDS TAB SWITCHING
document.querySelectorAll('.trends-sub-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTrendSection = btn.dataset.trend;
    document.querySelectorAll('.trends-sub-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (trendsCache) renderTrendsView();
  });
});

// LEADERBOARD SORT BUTTONS (delegated since they're re-rendered)
document.getElementById('trends-body').addEventListener('click', e => {
  const btn = e.target.closest('.lb-sort-btn');
  if (!btn) return;
  lbSort = btn.dataset.lbsort;
  renderLeaderboard();
});

// VIEW TOGGLE (table / leaderboard)
document.querySelectorAll('.trends-view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTrendView = btn.dataset.view;
    document.querySelectorAll('.trends-view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const sortWrap = document.getElementById('trends-sort-wrap');
    if (sortWrap) sortWrap.style.opacity = activeTrendView === 'leaderboard' ? '0.3' : '1';
    if (trendsCache) renderTrendsView();
  });
});

// TRENDS SORT BUTTONS
document.querySelectorAll('.trends-sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (activeTrendView === 'leaderboard') return; // sort disabled in leaderboard
    const sort = btn.dataset.sort;
    if (activeTrendSort === sort) { trendSortAsc = !trendSortAsc; }
    else { activeTrendSort = sort; trendSortAsc = false; }
    document.querySelectorAll('.trends-sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (trendsCache) renderTrends();
  });
});

// REFRESH BUTTON
document.getElementById('trends-refresh-btn').addEventListener('click', () => {
  trendsCache = null;
  loadTrends(true);
});

// Hook into main tab switch to auto-load trends
const _origTabSwitch = document.querySelectorAll('.tab-btn');
_origTabSwitch.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.tab === 'trends' && !trendsCache && !trendsLoading) {
      loadTrends();
    }
  });
});
</script>
</body>
</html>
